name: Close stale issues and PRs

on:
  schedule:
    - cron: "30 1 * * *"   # daily 01:30 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 45
          days-before-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,help wanted,good first issue"
          exempt-pr-labels: "pinned,security,work-in-progress"
          stale-issue-message: >
            This issue has been inactive for 45 days and is now marked **stale**.
            Remove the stale label or comment to keep it open — otherwise it will
            be closed in 14 days.
          stale-pr-message: >
            This pull request has been inactive for 45 days and is now marked **stale**.
            Please update it or comment to keep it open — otherwise it will be closed
            in 14 days.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen with new information.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen when you're ready to continue.
