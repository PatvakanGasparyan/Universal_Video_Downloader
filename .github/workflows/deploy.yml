name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.IAM_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GITHUB_TOKEN,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY
          command_timeout: 30m
          script: |
            set -euo pipefail

            # Step 0 (Force Swap): create 2GB swap to prevent OOM on t3.micro
            sudo fallocate -l 2G /swapfile || true
            sudo chmod 600 /swapfile || true
            sudo mkswap /swapfile || true
            sudo swapon /swapfile || true

            # Step 0.5 (Fix dpkg): clean up interrupted package installations
            sudo dpkg --configure -a || true

            # Step 1 (Install): install git and docker without prompts
            sudo apt-get update -y
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -yq git docker.io

            APP_DIR="/opt/universal-video-downloader"
            IMAGE_NAME="universal-video-downloader:latest"
            REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

            # Step 2 (Sync Code): clone or hard-reset to latest master
            if [ -d "${APP_DIR}/.git" ]; then
              sudo chown -R ubuntu:ubuntu "${APP_DIR}"
              cd "${APP_DIR}"
              git remote set-url origin "${REPO_URL}"
              git fetch origin master
              git reset --hard origin/master
            else
              sudo mkdir -p "${APP_DIR}"
              sudo chown -R ubuntu:ubuntu "${APP_DIR}"
              git clone --branch master --depth 1 "${REPO_URL}" "${APP_DIR}"
              cd "${APP_DIR}"
            fi

            # Step 3 (Build): build Docker image on the EC2 host
            sudo docker build -t "${IMAGE_NAME}" .

            # Step 4 (k3s Import): load image into the k3s container runtime
            sudo docker save "${IMAGE_NAME}" | sudo k3s ctr images import -

            # Step 5 (Secrets): namespace + preserve existing SECRET_KEY if present
            sudo k3s kubectl create namespace universal-video-downloader --dry-run=client -o yaml | sudo k3s kubectl apply -f -

            EXISTING_SECRET_KEY=""
            if sudo k3s kubectl get secret uvd-secrets -n universal-video-downloader >/dev/null 2>&1; then
              EXISTING_SECRET_KEY="$(sudo k3s kubectl get secret uvd-secrets -n universal-video-downloader -o jsonpath='{.data.SECRET_KEY}' | base64 -d 2>/dev/null || true)"
            fi
            SECRET_KEY_VALUE="${EXISTING_SECRET_KEY:-change-me-in-production}"

            sudo k3s kubectl create secret generic uvd-secrets \
              --namespace=universal-video-downloader \
              --from-literal=SECRET_KEY="${SECRET_KEY_VALUE}" \
              --from-literal=AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID}" \
              --from-literal=AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY}" \
              --dry-run=client -o yaml | sudo k3s kubectl apply -f -

            # Step 6 (Apply): deploy all Kubernetes manifests
            sudo k3s kubectl apply -f k8s/

            # Step 7 (Rollout): restart deployment and wait for readiness
            sudo k3s kubectl rollout restart deployment/uvd-backend -n universal-video-downloader
            sudo k3s kubectl rollout status deployment/uvd-backend -n universal-video-downloader --timeout=120s
