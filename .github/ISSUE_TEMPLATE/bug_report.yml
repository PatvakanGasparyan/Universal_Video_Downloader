name: 🐛 Bug Report
description: Report a problem so we can fix it
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! 🙏
        Please search [existing issues](https://github.com/PatvakanGasparyan/Universal_Video_Downloader/issues) first.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I updated yt-dlp (`pip install -U yt-dlp` / rebuilt the image)
          required: true
        - label: I read the [Troubleshooting guide](https://github.com/PatvakanGasparyan/Universal_Video_Downloader/blob/master/docs/TROUBLESHOOTING.md)
          required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Paste URL '...'
        3. Click '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: url-type
    attributes:
      label: Source site
      description: Which platform? (e.g. YouTube, Rutube). Do NOT paste private URLs.
      placeholder: YouTube

  - type: dropdown
    id: deployment
    attributes:
      label: How are you running it?
      options:
        - Native (venv)
        - Docker / Docker Compose
        - AWS EC2 / k3s
        - Other
    validations:
      required: true

  - type: textarea
    id: versions
    attributes:
      label: Versions
      description: Output of the commands below.
      value: |
        - OS:
        - Python (`python --version`):
        - yt-dlp (`pip show yt-dlp | grep Version`):
        - FFmpeg (`ffmpeg -version | head -n1`):
      render: markdown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste logs here. **Redact cookies and secrets!**
      render: shell

  - type: textarea
    id: error-envelope
    attributes:
      label: Error code (if any)
      description: The `error` field from the JSON error envelope, e.g. `youtube_auth_required`.
