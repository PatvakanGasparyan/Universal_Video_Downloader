apiVersion: apps/v1
kind: Deployment
metadata:
  name: uvd-backend
  namespace: universal-video-downloader
  labels:
    app.kubernetes.io/name: universal-video-downloader
    app.kubernetes.io/component: backend
spec:
  # Single replica for t3.micro (1GB RAM) — two pods OOM the node
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: universal-video-downloader
      app.kubernetes.io/component: backend
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: universal-video-downloader
        app.kubernetes.io/component: backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          # Overridden by deploy workflow to ghcr.io/<owner>/<repo>:<sha>
          image: ghcr.io/OWNER/universal-video-downloader:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: uvd-config
            - secretRef:
                name: uvd-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: downloads
              mountPath: /app/backend/downloads
            - name: logs
              mountPath: /app/logs
      volumes:
        # data/ holds SQLite + cookies.txt (survives container restarts within the pod lifecycle)
        - name: data
          emptyDir: {}
        - name: downloads
          emptyDir: {}
        - name: logs
          emptyDir: {}
