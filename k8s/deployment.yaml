apiVersion: apps/v1
kind: Deployment
metadata:
  name: uvd-backend
  namespace: universal-video-downloader
  labels:
    app.kubernetes.io/name: universal-video-downloader
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: universal-video-downloader
      app.kubernetes.io/component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: universal-video-downloader
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          # Build on the EC2 node: docker build -t universal-video-downloader:latest .
          image: universal-video-downloader:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: uvd-config
            - secretRef:
                name: uvd-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: downloads
              mountPath: /app/backend/downloads
            - name: logs
              mountPath: /app/logs
      volumes:
        # emptyDir lets both replicas run on a single k3s node.
        # For durable storage, replace with PersistentVolumeClaims (ReadWriteOnce
        # allows only one pod to mount — use an external DB for true multi-replica HA).
        - name: data
          emptyDir: {}
        - name: downloads
          emptyDir: {}
        - name: logs
          emptyDir: {}
